<style>
        /* تنظیمات پایه */
        body {
            font-family: Tahoma, sans-serif;
            background-color: #f0f0f5;
            color: #333;
            margin: 0;
            padding: 0;
            direction: rtl;
        }

        /* هدر اصلی */
        h1 {
            text-align: center;
            background-color: #4CAF50;
            color: white;
            padding: 20px 0;
            margin: 0 0 30px 0;
            font-size: 2em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* جعبه‌های بازی */
        .game-box {
            background-color: white;
            margin: 20px auto;
            padding: 20px;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .game-box:hover {
            transform: scale(1.02);
        }

        h2 {
            color: #4CAF50;
            margin-bottom: 10px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
        }

        a {
            text-decoration: none;
            color: white;
            background-color: #4CAF50;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s;
        }

        a:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        p {
            text-align: center;
            font-size: 1.2em;
            color: #555;
        }

        /* واکنش‌گرایی */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.5em;
                padding: 15px 0;
            }

            .game-box {
                margin: 15px;
                padding: 15px;
            }

            a {
                display: block;
                text-align: center;
                padding: 12px 0;
            }
        }

<head>
